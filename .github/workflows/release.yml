name: Release

# Tag a release (e.g. v0.1.0) to build, sign and publish the plugin to the JetBrains Marketplace.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build, sign & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Verify plugin
        run: gradle verifyPlugin --no-daemon --stacktrace

      - name: Build, sign & publish
        env:
          # Required secrets — configure in the repo settings:
          #   PUBLISH_TOKEN          JetBrains Marketplace token (Account | My Tokens)
          #   CERTIFICATE_CHAIN      chain.crt contents
          #   PRIVATE_KEY            private.pem contents
          #   PRIVATE_KEY_PASSWORD   key passphrase
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: gradle publishPlugin --no-daemon --stacktrace

      - name: Upload signed distribution
        uses: actions/upload-artifact@v4
        with:
          name: titanium-plugin-signed
          path: build/distributions/*.zip
          if-no-files-found: error
