# Plugin coordinates
pluginGroup=com.tidev.titanium
pluginName=Titanium
pluginVersion=0.1.0

# Compatibility range. 243 == 2024.3. untilBuild is left open in build.gradle.kts.
pluginSinceBuild=243

# Compile base. The JavaScript plugin is bundled-only, so we compile against
# IntelliJ IDEA *Ultimate* (which bundles it). Thanks to the OPTIONAL <depends>
# in plugin.xml the produced artifact still loads on Community IDEs.
platformType=IU
platformVersion=2024.3

# Toolchain
javaVersion=17

# Gradle
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC
kotlin.stdlib.default.dependency=false
